<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        
        .shopping-list {
            list-style: none;
        }
        
        .list-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }
        
        .list-item:hover {
            background: #e9ecef;
        }
        
        .list-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin-right: 15px;
            flex-shrink: 0;
        }
        
        .list-item-text {
            flex: 1;
            color: #333;
            font-size: 16px;
            word-break: break-word;
            transition: all 0.2s ease;
        }
        
        .list-item input[type="checkbox"]:checked ~ .list-item-text {
            text-decoration: line-through;
            color: #999;
        }
        
        .info {
            margin-top: 30px;
            padding: 15px;
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }
        
        .info strong {
            display: block;
            margin-bottom: 8px;
            color: #667eea;
        }
        
        code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            color: #d63384;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Shopping List</h1>
        <ul class="shopping-list" id="shoppingList"></ul>
        
        <div class="info">
            <strong>📝 How to customize:</strong>
            Edit the <code>items</code> array below in the code editor to add, remove, or rename items.
        </div>
    </div>
    
    <script>
        // ===== EDIT THIS ARRAY TO CUSTOMIZE YOUR SHOPPING LIST =====
        const items = [
            "Milk",
            "Bread",
            "Eggs",
            "Cheese",
            "Apples",
            "Chicken",
            "Stuff",
            "Rice"
        ];
        // ===== END CUSTOMIZATION =====
        
        const shoppingList = document.getElementById('shoppingList');
        
        items.forEach((item, index) => {
            const li = document.createElement('li');
            li.className = 'list-item';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = `item-${index}`;
            
            const label = document.createElement('label');
            label.className = 'list-item-text';
            label.htmlFor = `item-${index}`;
            label.textContent = item;
            
            li.appendChild(checkbox);
            li.appendChild(label);
            shoppingList.appendChild(li);
        });
    </script>
</body>
</html>
