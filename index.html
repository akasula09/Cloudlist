<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        
        .shopping-list {
            list-style: none;
        }
        
        .list-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }
        
        .list-item:hover {
            background: #e9ecef;
        }
        
        .list-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin-right: 15px;
            flex-shrink: 0;
        }
        
        .list-item-text-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex: 1;
            word-break: break-word;
            cursor: pointer;
        }
        
        .list-item-text {
            color: #333;
            font-size: 16px;
            transition: all 0.2s ease;
        }
        
        .list-item-qty {
            background: #e7f3ff;
            color: #667eea;
            font-size: 13px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            margin-left: 10px;
            white-space: nowrap;
        }
        
        /* Handles striking through both item name and its quantity label */
        .list-item input[type="checkbox"]:checked ~ .list-item-text-wrapper .list-item-text {
            text-decoration: line-through;
            color: #999;
        }
        
        .list-item input[type="checkbox"]:checked ~ .list-item-text-wrapper .list-item-qty {
            background: #f0f0f0;
            color: #bbb;
            text-decoration: line-through;
        }
        
        .info {
            margin-top: 30px;
            padding: 15px;
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }
        
        .info strong {
            display: block;
            margin-bottom: 8px;
            color: #667eea;
        }
        
        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Shopping List</h1>
        <ul class="shopping-list" id="shoppingList">
            <li class="loading">Loading items from your live sheet...</li>
        </ul>
        
        <div class="info">
            <strong>📝 Multi-Column Support Active:</strong>
            Column A manages the Item Name. Column B handles the Quantity.
        </div>
    </div>
    
    <script>
      // Your newly updated multi-column web app URL
const API_URL = 'https://script.google.com/macros/s/AKfycbx6FVb1nY9LnCxLGWCFaNtHJtWjXKumfvmuyttbNbIuJ-2yIpXJ0NNBjRmQmF2B6FWK/exec'; 

const shoppingList = document.getElementById('shoppingList');

async function loadShoppingList() {
    try {
        // 1. Save currently checked items before wiping the list
        // We use the item's name as a unique identifier
        const checkedItems = new Set();
        document.querySelectorAll('.list-item input[type="checkbox"]:checked').forEach(checkbox => {
            const itemName = checkbox.nextElementSibling.querySelector('.list-item-text').textContent;
            checkedItems.add(itemName);
        });

        const response = await fetch(API_URL);
        if (!response.ok) throw new Error('API server down');
        
        const items = await response.json();
        shoppingList.innerHTML = '';
        
        if (!items || items.length === 0) {
            shoppingList.innerHTML = '<li class="loading">The sheet is empty! Add items under row 1.</li>';
            return;
        }

        // Pass the saved states to the render function
        renderList(items, checkedItems);

    } catch (error) {
        console.error('Error fetching list:', error);
        // Only show error if the list is completely empty so we don't destroy an existing list on a brief network blip
        if (shoppingList.children.length === 0 || shoppingList.querySelector('.loading')) {
            shoppingList.innerHTML = `
                <li class="list-item" style="color:#dc3545; font-weight:bold; display:block; text-align:center;">
                    ⚠️ Failed to load list.<br>
                    <span style="font-size:12px; font-weight:normal; color:#666;">
                        Ensure your Apps Script deployment is configured for access by "Anyone".
                    </span>
                </li>`;
        }
    }
}

function renderList(items, checkedItems) {
    items.forEach((item, index) => {
        const li = document.createElement('li');
        li.className = 'list-item';
        
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.id = `item-${index}`;
        
        // 2. Re-apply the checked state if this item was checked before the refresh
        if (checkedItems && checkedItems.has(item.name)) {
            checkbox.checked = true;
        }
        
        const wrapper = document.createElement('label');
        wrapper.className = 'list-item-text-wrapper';
        wrapper.htmlFor = `item-${index}`;
        
        const textSpan = document.createElement('span');
        textSpan.className = 'list-item-text';
        textSpan.textContent = item.name;
        wrapper.appendChild(textSpan);
        
        if (item.qty !== undefined && item.qty !== null && item.qty !== "") {
            const qtySpan = document.createElement('span');
            qtySpan.className = 'list-item-qty';
            qtySpan.textContent = item.qty;
            wrapper.appendChild(qtySpan);
        }
        
        li.appendChild(checkbox);
        li.appendChild(wrapper);
        shoppingList.appendChild(li);
    });
}

// 3. Initial load
loadShoppingList();

// 4. Auto-refresh every 15 seconds (10000 milliseconds)
setInterval(loadShoppingList, 1000);
    </script>
</body>
</html>
